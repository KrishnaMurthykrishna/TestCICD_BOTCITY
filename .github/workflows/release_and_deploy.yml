on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create build script
        run: |
          echo '#!/bin/bash' > build.sh
          echo 'zip -r maestro.zip . -x "*.git*"' >> build.sh
          chmod +x build.sh

      - name: Run build script
        run: ./build.sh

      - name: Checkout bot.sh
        run: |
          git clone --branch v1.0 https://github.com/botcity-dev/cicd-pipeline-utils.git
          chmod +x cicd-pipeline-utils/scripts/bot.sh

      - name: Deploy Bot
        env:
          SERVER: ${{ secrets.SERVER }}
          LOGIN: ${{ secrets.LOGIN }}
          KEY: ${{ secrets.KEY }}
        run: >
          cicd-pipeline-utils/scripts/bot.sh deploy 
          -version "1.1.0" 
          -botFile "./maestro.zip" 
          -botId "APITestingBOT" 
          -type "python" 
          -repository "DEFAULT"

      - name: Release Bot
        env:
          SERVER: ${{ secrets.SERVER }}
          LOGIN: ${{ secrets.LOGIN }}
          KEY: ${{ secrets.KEY }}
        run: >
          cicd-pipeline-utils/scripts/bot.sh release 
          -version "1.1.0" 
          -botId "APITestingBOT"
